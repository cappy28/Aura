<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AURA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--col1:10,10,18;--col2:20,15,30;--col3:8,18,28}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Outfit',sans-serif;background:#06060e;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
body::after{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.045;background-size:200px 200px}
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(var(--col1),.8) 0%,transparent 70%),radial-gradient(ellipse 70% 50% at 80% 70%,rgba(var(--col2),.7) 0%,transparent 70%),radial-gradient(ellipse 60% 80% at 50% 50%,rgba(var(--col3),.5) 0%,transparent 70%),#06060e;transition:background 2s cubic-bezier(.4,0,.2,1)}
#canvas{position:fixed;inset:0;z-index:1;pointer-events:none}

/* TOAST */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 16px;font-size:11px;font-weight:300;color:rgba(255,255,255,.8);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:88vw;text-align:center;line-height:1.4}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SCREENS */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .5s ease}
.screen.active{opacity:1;pointer-events:all}

/* IDLE */
#s-idle{gap:0}
.logo{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,14vw,88px);font-weight:300;letter-spacing:.18em;line-height:1;background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.35));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.tagline{font-size:11px;font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:72px}
.listen-btn-wrap{position:relative;cursor:pointer;margin-bottom:48px}
.listen-ripple{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.1);animation:ripple 3s ease-out infinite;inset:-24px}
.listen-ripple:nth-child(2){animation-delay:1s;inset:-40px}
.listen-ripple:nth-child(3){animation-delay:2s;inset:-56px}
@keyframes ripple{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.25)}}
.listen-btn{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .2s,background .2s;box-shadow:0 0 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1)}
.listen-btn:active{transform:scale(.95)}
.listen-btn span{font-size:10px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.idle-hint{font-size:12px;font-weight:300;color:rgba(255,255,255,.28);letter-spacing:.05em;text-align:center}

/* LISTENING */
#s-listening{gap:24px}
.countdown-ring{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
.countdown-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.countdown-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:2}
.countdown-progress{fill:none;stroke:rgba(255,255,255,.7);stroke-width:2;stroke-linecap:round;stroke-dasharray:565.5;stroke-dashoffset:565.5;transition:stroke-dashoffset .25s linear}
.countdown-inner{display:flex;flex-direction:column;align-items:center;gap:4px;z-index:1}
.countdown-num{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;line-height:1;background:linear-gradient(135deg,#fff,rgba(255,255,255,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.countdown-label{font-size:10px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.listening-status{font-size:13px;font-weight:300;letter-spacing:.12em;color:rgba(255,255,255,.5);text-transform:uppercase}
.listening-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff6b6b;margin-right:8px;animation:blinkDot 1s ease-in-out infinite;box-shadow:0 0 8px #ff6b6b}
@keyframes blinkDot{0%,100%{opacity:1}50%{opacity:.2}}
.cancel-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:10px 28px;color:rgba(255,255,255,.5);font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px}

/* IDENTIFYING */
#s-identifying{gap:20px}
.id-spinner{width:64px;height:64px;border-radius:50%;border:1.5px solid rgba(255,255,255,.08);border-top-color:rgba(255,255,255,.8);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.id-label{font-size:13px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.id-sub{font-size:11px;font-weight:200;color:rgba(255,255,255,.2);margin-top:-8px}

/* RESULT */
#s-result{gap:0;justify-content:flex-end;padding-bottom:52px}
.cover-scene{position:fixed;top:0;left:0;right:0;height:65dvh;display:flex;align-items:center;justify-content:center}
.cover-halo{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(var(--col1),.6) 0%,transparent 70%);filter:blur(40px);animation:haloPulse 4s ease-in-out infinite;transition:background 2s ease}
@keyframes haloPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:.9}}
.cover-ring-outer{position:absolute;width:240px;height:240px;border-radius:50%;border:1px solid rgba(255,255,255,.08);animation:spinSlow 25s linear infinite}
.cover-ring-outer::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);box-shadow:0 0 16px rgba(255,255,255,.8)}
@keyframes spinSlow{to{transform:rotate(360deg)}}
.cover-img{width:200px;height:200px;border-radius:50%;background-size:cover;background-position:center;box-shadow:0 20px 80px rgba(0,0,0,.6),0 0 0 6px rgba(255,255,255,.05);position:relative;z-index:2;transition:opacity .45s ease}
.cover-img.fade{opacity:0}
.scan-ring{position:absolute;width:222px;height:222px;border-radius:50%;z-index:3;border:1.5px solid transparent;pointer-events:none;transition:border-color .4s}
.scan-ring.active{border-color:rgba(255,255,255,.22);animation:scanPulse 2s ease-in-out infinite}
@keyframes scanPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.08)}50%{box-shadow:0 0 0 14px rgba(255,255,255,0)}}
.result-card{width:100%;max-width:400px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(30px);border-radius:28px;padding:28px 28px 20px;position:relative;z-index:10;transition:opacity .4s ease,transform .4s ease}
.result-card.fade{opacity:0;transform:translateY(10px)}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,7vw,36px);font-weight:500;line-height:1.1;margin-bottom:6px;letter-spacing:.01em}
.song-artist{font-size:13px;font-weight:300;color:rgba(255,255,255,.5);letter-spacing:.08em;margin-bottom:4px}
.song-album{font-size:11px;font-weight:200;color:rgba(255,255,255,.3);letter-spacing:.05em;margin-bottom:20px;font-style:italic;font-family:'Cormorant Garamond',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin-bottom:16px}
.result-actions{display:flex;align-items:center;justify-content:space-between}
.scanning-badge{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:300;color:rgba(255,255,255,.32);letter-spacing:.06em}
.scanning-dot-wrap{display:flex;gap:3px;align-items:center;height:14px}
.scan-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.35);animation:scanWave 1.4s ease-in-out infinite}
.scan-dot:nth-child(2){animation-delay:.2s}
.scan-dot:nth-child(3){animation-delay:.4s}
@keyframes scanWave{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(2);opacity:.95}}
.btn-stop{background:rgba(255,70,70,.07);border:1px solid rgba(255,100,100,.13);border-radius:100px;padding:9px 20px;color:rgba(255,150,150,.65);font-family:'Outfit',sans-serif;font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px}

/* ERROR */
#s-error{gap:16px}
.err-icon{font-size:48px;opacity:.5}
.err-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:rgba(255,255,255,.7)}
.err-sub{font-size:12px;font-weight:300;color:rgba(255,255,255,.35);text-align:center;max-width:300px;white-space:pre-line;line-height:1.7}
.btn-retry{margin-top:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:12px 32px;color:rgba(255,255,255,.7);font-family:'Outfit',sans-serif;font-size:12px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s}

/* SETTINGS */
#settings-toggle{position:fixed;top:20px;right:20px;z-index:100;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.4);transition:all .2s;backdrop-filter:blur(20px)}
#settings-panel{position:fixed;top:68px;right:20px;z-index:100;background:rgba(10,10,20,.92);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;width:260px;opacity:0;pointer-events:none;transform:translateY(-8px) scale(.97);transition:all .25s cubic-bezier(.4,0,.2,1)}
#settings-panel.open{opacity:1;pointer-events:all;transform:none}
.settings-label{font-size:10px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:8px}
.settings-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;color:#fff;font-family:'Outfit',sans-serif;font-size:12px;outline:none}
.settings-input::placeholder{color:rgba(255,255,255,.25)}
.settings-hint{font-size:10px;color:rgba(255,255,255,.2);margin-top:6px;line-height:1.5}
.settings-hint a{color:rgba(255,255,255,.4);text-decoration:none}
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="canvas"></canvas>
<div id="toast"></div>

<button id="settings-toggle">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
  </svg>
</button>
<div id="settings-panel">
  <div class="settings-label">Clé API AudD</div>
  <input class="settings-input" id="apiKeyInput" type="text" placeholder="Token AudD...">
  <div class="settings-hint">Clé gratuite sur <a href="https://audd.io" target="_blank">audd.io</a></div>
</div>

<div class="screen active" id="s-idle">
  <div class="logo">AURA</div>
  <div class="tagline">Reconnaissance musicale</div>
  <div class="listen-btn-wrap">
    <div class="listen-ripple"></div><div class="listen-ripple"></div><div class="listen-ripple"></div>
    <div class="listen-btn" id="listenBtn">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <span>Écouter</span>
    </div>
  </div>
  <div class="idle-hint">Lance une musique, puis appuie sur écouter</div>
</div>

<div class="screen" id="s-listening">
  <div class="countdown-ring">
    <svg width="200" height="200">
      <circle class="countdown-track" cx="100" cy="100" r="90"/>
      <circle class="countdown-progress" id="countdownCircle" cx="100" cy="100" r="90"/>
    </svg>
    <div class="countdown-inner">
      <div class="countdown-num" id="countdownNum">12</div>
      <div class="countdown-label">secondes</div>
    </div>
  </div>
  <div class="listening-status"><span class="listening-dot"></span>Enregistrement…</div>
  <button class="cancel-btn" id="cancelBtn">Annuler</button>
</div>

<div class="screen" id="s-identifying">
  <div class="id-spinner"></div>
  <div class="id-label">Identification…</div>
  <div class="id-sub">Analyse en cours</div>
</div>

<div class="screen" id="s-result">
  <div class="cover-scene">
    <div class="cover-halo" id="coverHalo"></div>
    <div class="cover-ring-outer"></div>
    <div class="cover-img" id="coverImg"></div>
    <div class="scan-ring" id="scanRing"></div>
  </div>
  <div class="result-card" id="resultCard">
    <div class="song-title" id="songTitle">—</div>
    <div class="song-artist" id="songArtist">—</div>
    <div class="song-album" id="songAlbum"></div>
    <div class="result-divider"></div>
    <div class="result-actions">
      <div class="scanning-badge">
        <div class="scanning-dot-wrap">
          <div class="scan-dot"></div><div class="scan-dot"></div><div class="scan-dot"></div>
        </div>
        <span id="scanStatus">En écoute…</span>
      </div>
      <button class="btn-stop" id="btnStop">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
    </div>
  </div>
</div>

<div class="screen" id="s-error">
  <div class="err-icon">🎵</div>
  <div class="err-title">Non identifié</div>
  <div class="err-sub" id="errMsg">Aucune musique détectée.</div>
  <button class="btn-retry" id="btnRetry">Réessayer</button>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const RECORD_SECS  = 12;
const LOOP_GAP_MS  = 5000;
const CIRC         = 2 * Math.PI * 90;
const API_KEY      = 'cdfe11298e7754a27420b81f750daf7e';

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let audioCtx, analyser, micStream;
let isActive = false, isFirstScan = true;
let countdownInterval, loopTimeout, animFrame;
let currentSongKey = '';
let toastTimer;

// ═══════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const C = canvas.getContext('2d');
const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
resize(); window.addEventListener('resize', resize);

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function toast(msg, ms = 5000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

// ═══════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════
const S = ['idle','listening','identifying','result','error']
  .reduce((o,id) => { o[id] = document.getElementById('s-'+id); return o; }, {});

function show(name) {
  Object.values(S).forEach(s => s.classList.remove('active'));
  S[name]?.classList.add('active');
}

// ═══════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════
const settingsToggle = document.getElementById('settings-toggle');
const settingsPanel  = document.getElementById('settings-panel');
settingsToggle.addEventListener('click', e => { e.stopPropagation(); settingsPanel.classList.toggle('open'); });
document.addEventListener('click',       e => { if (!settingsPanel.contains(e.target)) settingsPanel.classList.remove('open'); });
const getKey = () => document.getElementById('apiKeyInput').value.trim() || API_KEY;

// ═══════════════════════════════════════════
//  BUTTONS
// ═══════════════════════════════════════════
document.getElementById('listenBtn').addEventListener('click', activate);
document.getElementById('btnRetry').addEventListener('click',  activate);
document.getElementById('cancelBtn').addEventListener('click', () => { deactivate(); show('idle'); });
document.getElementById('btnStop').addEventListener('click',   () => { deactivate(); show('idle'); });

// ═══════════════════════════════════════════
//  ACTIVATE
// ═══════════════════════════════════════════
async function activate() {
  if (isActive) return;

  let stream = null;
  // First try: echoCancellation OFF (better for music)
  const constraints = [
    { audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } },
    { audio: true }
  ];

  for (const c of constraints) {
    try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
    catch(e) { /* try next */ }
  }

  if (!stream) {
    showErr('Micro inaccessible.\nAutorise le microphone dans le navigateur.');
    return;
  }

  micStream = stream;
  audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.82;
  audioCtx.createMediaStreamSource(stream).connect(analyser);

  isActive = true;
  isFirstScan = true;
  currentSongKey = '';
  drawViz();
  runLoop();
}

function deactivate() {
  isActive = false;
  clearInterval(countdownInterval);
  clearTimeout(loopTimeout);
  cancelAnimationFrame(animFrame);
  C.clearRect(0, 0, canvas.width, canvas.height);
  micStream?.getTracks().forEach(t => t.stop());
  audioCtx?.close().catch(() => {});
  isFirstScan = true;
  currentSongKey = '';
  document.getElementById('scanRing').classList.remove('active');
}

// ═══════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════
async function runLoop() {
  if (!isActive) return;
  await doScan();
  if (!isActive) return;
  loopTimeout = setTimeout(runLoop, LOOP_GAP_MS);
}

// ═══════════════════════════════════════════
//  RECORD — using ScriptProcessor to capture
//  raw PCM, then encode to WAV manually.
//  This avoids MediaRecorder codec issues on
//  Samsung Internet / Android WebView.
// ═══════════════════════════════════════════
function doScan() {
  return new Promise(async (resolve) => {
    if (!isActive) { resolve(); return; }

    toast('🎙️ Enregistrement…');

    if (isFirstScan) show('listening');
    else {
      document.getElementById('scanRing').classList.add('active');
      setScanStatus('Rescanning…');
    }

    // --- Countdown UI ---
    let t = RECORD_SECS;
    updateCountUI(t, RECORD_SECS);
    countdownInterval = setInterval(() => {
      t--;
      updateCountUI(t, RECORD_SECS);
    }, 1000);

    // --- Record raw PCM via ScriptProcessor ---
    const sampleRate = audioCtx.sampleRate;
    const bufSize    = 4096;
    const pcmChunks  = [];
    let totalSamples = 0;

    const source    = audioCtx.createMediaStreamSource(micStream);
    const processor = audioCtx.createScriptProcessor(bufSize, 1, 1);

    processor.onaudioprocess = (e) => {
      if (!isActive) return;
      const data = e.inputBuffer.getChannelData(0);
      pcmChunks.push(new Float32Array(data));
      totalSamples += data.length;
    };

    source.connect(processor);
    processor.connect(audioCtx.destination);

    // Wait for recording duration
    await sleep(RECORD_SECS * 1000);

    // Stop capturing
    clearInterval(countdownInterval);
    processor.disconnect();
    source.disconnect();

    if (!isActive) { resolve(); return; }

    // --- Encode to WAV ---
    toast('🔄 Encodage…');
    const wavBlob = pcmToWav(pcmChunks, totalSamples, sampleRate);
    toast(`📤 Envoi… (${Math.round(wavBlob.size / 1024)} KB, WAV 16kHz)`);

    if (isFirstScan) show('identifying');
    else setScanStatus('Identification…');

    await identify(wavBlob);
    resolve();
  });
}

function updateCountUI(remaining, total) {
  document.getElementById('countdownNum').textContent = remaining;
  const filled = ((total - remaining) / total) * CIRC;
  document.getElementById('countdownCircle').style.strokeDashoffset = CIRC - filled;
}

// ═══════════════════════════════════════════
//  PCM → WAV encoder
// ═══════════════════════════════════════════
function pcmToWav(chunks, totalSamples, sampleRate) {
  // Downsample to 16kHz mono for smaller file
  const targetRate  = 16000;
  const ratio       = sampleRate / targetRate;
  const outSamples  = Math.floor(totalSamples / ratio);

  // Flatten PCM chunks
  const flat = new Float32Array(totalSamples);
  let offset = 0;
  for (const c of chunks) { flat.set(c, offset); offset += c.length; }

  // Downsample
  const pcm16 = new Int16Array(outSamples);
  for (let i = 0; i < outSamples; i++) {
    const srcIdx = Math.min(Math.floor(i * ratio), totalSamples - 1);
    pcm16[i] = Math.max(-32768, Math.min(32767, flat[srcIdx] * 32767));
  }

  // Build WAV header
  const dataLen   = pcm16.byteLength;
  const buffer    = new ArrayBuffer(44 + dataLen);
  const view      = new DataView(buffer);
  const writeStr  = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };

  writeStr(0,  'RIFF');
  view.setUint32(4,  36 + dataLen, true);
  writeStr(8,  'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);          // chunk size
  view.setUint16(20, 1,  true);          // PCM
  view.setUint16(22, 1,  true);          // mono
  view.setUint32(24, targetRate, true);  // sample rate
  view.setUint32(28, targetRate * 2, true); // byte rate
  view.setUint16(32, 2,  true);          // block align
  view.setUint16(34, 16, true);          // bits per sample
  writeStr(36, 'data');
  view.setUint32(40, dataLen, true);

  const out = new Uint8Array(buffer);
  out.set(new Uint8Array(pcm16.buffer), 44);

  return new Blob([buffer], { type: 'audio/wav' });
}

// ═══════════════════════════════════════════
//  IDENTIFY
// ═══════════════════════════════════════════
async function identify(blob) {
  const kb = Math.round(blob.size / 1024);

  if (blob.size < 5000) {
    const msg = `Audio trop petit (${kb} KB).\nAugmente le volume et rapproche\nle téléphone de l'enceinte.`;
    if (isFirstScan) showErr(msg);
    else { toast(`⚠️ Audio trop petit (${kb} KB)`); endRescan(); }
    return;
  }

  const fd = new FormData();
  fd.append('api_token', getKey());
  fd.append('audio', blob, 'recording.wav');
  fd.append('return', 'spotify,apple_music');

  try {
    const res  = await fetch('https://api.audd.io/', { method: 'POST', body: fd });
    const data = await res.json();

    // Debug
    if (data.result)      toast(`✅ ${data.result.title} — ${data.result.artist}`);
    else if (data.error)  toast(`❌ Err ${data.error.error_code}: ${data.error.error_message}`);
    else                  toast(`🔍 AudD: ${data.status} — pas identifié`);

    if (data.status === 'success' && data.result) {
      const r   = data.result;
      const key = `${r.title}|||${r.artist}`;
      const isNew = key !== currentSongKey;
      currentSongKey = key;
      isFirstScan = false;
      await showResult(r, isNew);

    } else if (data.status === 'error') {
      const code = data.error?.error_code;
      if (code === 901) {
        if (isFirstScan) showErr('Limite API atteinte.\nEntre ta clé dans les paramètres ⚙️');
        else endRescan();
      } else if (code === 300) {
        if (isFirstScan) showErr('Clé API invalide ⚙️');
        else endRescan();
      } else {
        if (isFirstScan) showErr(`Erreur API ${code}.\nRéessaie.`);
        else endRescan();
      }
    } else {
      if (isFirstScan) {
        showErr(
          'Musique non reconnue 😕\n\n' +
          '• Monte le volume au maximum\n' +
          '• Approche le téléphone de l\'enceinte\n' +
          '• La musique doit sortir du haut-parleur\n' +
          '  (pas d\'écouteurs)\n' +
          '• Réessaie'
        );
      } else endRescan();
    }
  } catch (e) {
    toast('❌ Réseau: ' + e.message);
    if (isFirstScan) showErr('Erreur réseau.\nVérifie ta connexion internet.');
    else endRescan();
  }
}

// ═══════════════════════════════════════════
//  RESULT
// ═══════════════════════════════════════════
async function showResult(r, isNew) {
  const card  = document.getElementById('resultCard');
  const cover = document.getElementById('coverImg');
  const onResult = S.result.classList.contains('active');

  if (isNew && onResult) {
    card.classList.add('fade');
    cover.classList.add('fade');
    await sleep(440);
  }

  document.getElementById('songTitle').textContent  = r.title  || '—';
  document.getElementById('songArtist').textContent = r.artist || '—';
  document.getElementById('songAlbum').textContent  = r.album  || '';

  let coverUrl = null;
  if (r.spotify?.album?.images?.[0]?.url)    coverUrl = r.spotify.album.images[0].url;
  else if (r.apple_music?.artwork?.url)       coverUrl = r.apple_music.artwork.url.replace('{w}','400').replace('{h}','400');

  if (isNew && coverUrl) {
    cover.style.backgroundImage = `url('${coverUrl}')`;
    await extractColors(coverUrl);
  }

  show('result');
  document.getElementById('scanRing').classList.remove('active');
  setScanStatus('En écoute…');

  if (isNew && onResult) {
    await sleep(20);
    card.classList.remove('fade');
    cover.classList.remove('fade');
  }
}

function endRescan() {
  document.getElementById('scanRing').classList.remove('active');
  setScanStatus('En écoute…');
}

function setScanStatus(txt) {
  document.getElementById('scanStatus').textContent = txt;
}

function showErr(msg) {
  deactivate();
  document.getElementById('errMsg').textContent = msg;
  show('error');
}

// ═══════════════════════════════════════════
//  COLOR EXTRACTION
// ═══════════════════════════════════════════
async function extractColors(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const cv = document.createElement('canvas');
        cv.width = cv.height = 80;
        const cx2 = cv.getContext('2d');
        cx2.drawImage(img, 0, 0, 80, 80);
        const d  = cx2.getImageData(0, 0, 80, 80).data;
        const px = (x, y) => { const i=(y*80+x)*4; return {r:d[i],g:d[i+1],b:d[i+2]}; };
        const dk = ({r,g,b}, f=0.28) => ({r:Math.round(r*f),g:Math.round(g*f),b:Math.round(b*f)});
        const a  = dk(px(40,40));
        const b  = dk(px(8,8));
        const cc = dk(px(72,72));
        document.getElementById('bg').style.background = `
          radial-gradient(ellipse 80% 60% at 20% 30%,rgba(${b.r},${b.g},${b.b},.9) 0%,transparent 65%),
          radial-gradient(ellipse 70% 50% at 80% 70%,rgba(${cc.r},${cc.g},${cc.b},.8) 0%,transparent 65%),
          radial-gradient(ellipse 60% 80% at 50% 10%,rgba(${a.r},${a.g},${a.b},.6) 0%,transparent 65%),
          #06060e`;
        document.getElementById('coverHalo').style.background =
          `radial-gradient(circle,rgba(${a.r},${a.g},${a.b},.9) 0%,transparent 70%)`;
      } catch(e){}
      resolve();
    };
    img.onerror = resolve;
    img.src = url;
  });
}

// ═══════════════════════════════════════════
//  VISUALIZER
// ═══════════════════════════════════════════
const pts = Array.from({length:80}, () => ({
  angle: Math.random()*Math.PI*2, r:120+Math.random()*220,
  speed:(Math.random()-.5)*.006, size:.8+Math.random()*2, fi:Math.floor(Math.random()*100)
}));

function drawViz() {
  if (!isActive || !analyser) return;
  animFrame = requestAnimationFrame(drawViz);
  const W=canvas.width, H=canvas.height;
  C.clearRect(0,0,W,H);
  const buf=analyser.frequencyBinCount;
  const freq=new Uint8Array(buf), time=new Uint8Array(buf);
  analyser.getByteFrequencyData(freq); analyser.getByteTimeDomainData(time);
  const vol=Math.min(freq.slice(0,128).reduce((a,b)=>a+b,0)/128/200,1);
  const cx=W/2, cy=H/2, B=100;

  const g=C.createRadialGradient(cx,cy,B,cx,cy,B+180);
  g.addColorStop(0,`rgba(255,255,255,${.02+vol*.06})`); g.addColorStop(1,'rgba(255,255,255,0)');
  C.beginPath(); C.arc(cx,cy,B+180,0,Math.PI*2); C.fillStyle=g; C.fill();

  for(let i=0;i<120;i++){
    const a=(i/120)*Math.PI*2-Math.PI/2, v=freq[Math.floor(i*buf/120/3)]/255, bh=6+v*80;
    C.beginPath(); C.moveTo(cx+Math.cos(a)*B,cy+Math.sin(a)*B); C.lineTo(cx+Math.cos(a)*(B+bh),cy+Math.sin(a)*(B+bh));
    C.strokeStyle=`hsla(${180+v*80},30%,88%,${.25+v*.75})`; C.lineWidth=2; C.lineCap='round'; C.stroke();
  }

  C.beginPath();
  for(let i=0;i<buf;i++){
    const a=(i/buf)*Math.PI*2-Math.PI/2, v=(time[i]-128)/128, r=B-10+v*20*vol;
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    i===0?C.moveTo(x,y):C.lineTo(x,y);
  }
  C.closePath(); C.strokeStyle=`rgba(255,255,255,${.1+vol*.2})`; C.lineWidth=1.5; C.stroke();

  pts.forEach(p=>{
    p.angle+=p.speed+vol*.003;
    const fv=freq[p.fi]/255, r=B+20+fv*80*vol+p.r*.25;
    C.beginPath(); C.arc(cx+Math.cos(p.angle)*r,cy+Math.sin(p.angle)*r,p.size+fv*1.5,0,Math.PI*2);
    C.fillStyle=`rgba(255,255,255,${.07+fv*.5})`; C.fill();
  });
}

const sleep = ms => new Promise(r => setTimeout(r, ms));
