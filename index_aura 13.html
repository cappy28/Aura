<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AURA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--col1:10,10,18;--col2:20,15,30;--col3:8,18,28}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Outfit',sans-serif;background:#06060e;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
body::after{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.04;background-size:200px 200px}
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(var(--col1),.8) 0%,transparent 70%),radial-gradient(ellipse 70% 50% at 80% 70%,rgba(var(--col2),.7) 0%,transparent 70%),radial-gradient(ellipse 60% 80% at 50% 50%,rgba(var(--col3),.5) 0%,transparent 70%),#06060e;transition:background 2s ease}
#canvas{position:fixed;inset:0;z-index:1;pointer-events:none}
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:1000;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 16px;font-size:11px;color:rgba(255,255,255,.85);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:88vw;text-align:center;line-height:1.5;white-space:pre-line}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .5s ease}
.screen.active{opacity:1;pointer-events:all}
#s-idle{gap:0}
.logo{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,14vw,88px);font-weight:300;letter-spacing:.18em;line-height:1;background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.35));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.tagline{font-size:11px;font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:72px}
.listen-btn-wrap{position:relative;cursor:pointer;margin-bottom:48px}
.listen-ripple{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.1);animation:ripple 3s ease-out infinite;inset:-24px}
.listen-ripple:nth-child(2){animation-delay:1s;inset:-40px}.listen-ripple:nth-child(3){animation-delay:2s;inset:-56px}
@keyframes ripple{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.25)}}
.listen-btn{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .2s,background .2s;box-shadow:0 0 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1)}
.listen-btn:active{transform:scale(.95)}
.listen-btn span{font-size:10px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6)}
.idle-hint{font-size:12px;font-weight:300;color:rgba(255,255,255,.28);letter-spacing:.05em;text-align:center}
#s-listening{gap:24px}
.countdown-ring{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
.countdown-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.countdown-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:2}
.countdown-progress{fill:none;stroke:rgba(255,255,255,.7);stroke-width:2;stroke-linecap:round;stroke-dasharray:565.5;stroke-dashoffset:565.5;transition:stroke-dashoffset .25s linear}
.countdown-inner{display:flex;flex-direction:column;align-items:center;gap:4px;z-index:1}
.countdown-num{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;line-height:1;background:linear-gradient(135deg,#fff,rgba(255,255,255,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.countdown-label{font-size:10px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.listening-status{font-size:13px;font-weight:300;letter-spacing:.12em;color:rgba(255,255,255,.5);text-transform:uppercase}
.listening-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff6b6b;margin-right:8px;animation:blinkDot 1s ease-in-out infinite;box-shadow:0 0 8px #ff6b6b}
@keyframes blinkDot{0%,100%{opacity:1}50%{opacity:.2}}
.cancel-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:10px 28px;color:rgba(255,255,255,.5);font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:8px}
#s-identifying{gap:20px}
.id-spinner{width:64px;height:64px;border-radius:50%;border:1.5px solid rgba(255,255,255,.08);border-top-color:rgba(255,255,255,.8);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.id-label{font-size:13px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.id-sub{font-size:11px;font-weight:200;color:rgba(255,255,255,.2);margin-top:-8px}
#s-result{gap:0;justify-content:flex-end;padding-bottom:40px}
.cover-scene{position:fixed;top:0;left:0;right:0;height:62dvh;display:flex;align-items:center;justify-content:center}
.cover-halo{position:absolute;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(var(--col1),.5) 0%,transparent 70%);filter:blur(60px);animation:haloPulse 4s ease-in-out infinite;transition:background 2s ease;pointer-events:none;z-index:0}
@keyframes haloPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.2);opacity:.8}}
.turntable-board{position:relative;z-index:1;background:
  repeating-linear-gradient(92deg,rgba(255,255,255,.012) 0px,rgba(0,0,0,.018) 2px,transparent 2px,transparent 8px),
  repeating-linear-gradient(88deg,rgba(255,255,255,.008) 0px,transparent 4px,rgba(0,0,0,.012) 4px,transparent 10px),
  linear-gradient(170deg,#c8954a 0%,#b5803a 20%,#a06830 45%,#b87c3e 60%,#9a6028 80%,#c08040 100%);
border-radius:18px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.15);border:1px solid rgba(139,90,40,.4)}
/* SVG tourne-disque complet */
.turntable-svg{display:block;width:320px;height:320px}
/* Vinyle tourne autour de 160,160 */
#vinyl-group{transform-origin:160px 160px;animation:spinVinyl 2.8s linear infinite;animation-play-state:paused}
#vinyl-group.playing{animation-play-state:running}
@keyframes spinVinyl{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
/* Bras pivote autour de 292,38 — repos=28deg, lecture=8deg */
#arm-group{transform-origin:292px 38px;transform:rotate(28deg);transition:transform 1.4s cubic-bezier(.4,0,.2,1)}
#arm-group.on-record{transform:rotate(8deg)}
/* Lueur rubis amplifiée sur disque */
#arm-group.on-record #rubyDot{filter:drop-shadow(0 0 6px rgba(255,60,60,.9)) drop-shadow(0 0 14px rgba(255,0,0,.6))}
.cover-img{display:none}
.result-card{width:100%;max-width:400px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(30px);border-radius:28px;padding:28px 28px 20px;position:relative;z-index:10;transition:opacity .4s ease,transform .4s ease}
.result-card.fade{opacity:0;transform:translateY(10px)}
.song-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,7vw,36px);font-weight:500;line-height:1.1;margin-bottom:6px;letter-spacing:.01em}
.song-artist{font-size:13px;font-weight:300;color:rgba(255,255,255,.5);letter-spacing:.08em;margin-bottom:4px}
.song-album{font-size:11px;font-weight:200;color:rgba(255,255,255,.3);letter-spacing:.05em;margin-bottom:20px;font-style:italic;font-family:'Cormorant Garamond',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin-bottom:16px}
.result-actions{display:flex;align-items:center;justify-content:space-between}
.scanning-badge{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:300;color:rgba(255,255,255,.32);letter-spacing:.06em}
.scanning-dot-wrap{display:flex;gap:3px;align-items:center;height:14px}
.scan-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.35);animation:scanWave 1.4s ease-in-out infinite}
.scan-dot:nth-child(2){animation-delay:.2s}.scan-dot:nth-child(3){animation-delay:.4s}
@keyframes scanWave{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(2);opacity:.95}}
.btn-stop{background:rgba(255,70,70,.07);border:1px solid rgba(255,100,100,.13);border-radius:100px;padding:9px 20px;color:rgba(255,150,150,.65);font-family:'Outfit',sans-serif;font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:7px}
#s-error{gap:16px}
.err-icon{font-size:48px;opacity:.5}
.err-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:rgba(255,255,255,.7)}
.err-sub{font-size:12px;font-weight:300;color:rgba(255,255,255,.35);text-align:center;max-width:300px;white-space:pre-line;line-height:1.7}
.btn-retry{margin-top:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:12px 32px;color:rgba(255,255,255,.7);font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
#settings-toggle{position:fixed;top:20px;right:20px;z-index:100;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.4);backdrop-filter:blur(20px)}
#settings-panel{position:fixed;top:68px;right:20px;z-index:100;background:rgba(10,10,20,.92);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;width:260px;opacity:0;pointer-events:none;transform:translateY(-8px) scale(.97);transition:all .25s cubic-bezier(.4,0,.2,1)}
#settings-panel.open{opacity:1;pointer-events:all;transform:none}
.settings-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px}
.settings-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;color:#fff;font-family:'Outfit',sans-serif;font-size:12px;outline:none;margin-bottom:10px}
.settings-input::placeholder{color:rgba(255,255,255,.25)}
.settings-hint{font-size:10px;color:rgba(255,255,255,.2);margin-top:2px;line-height:1.5}
.settings-hint a{color:rgba(255,255,255,.4);text-decoration:none}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="canvas"></canvas>
<div id="toast"></div>

<button id="settings-toggle">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
  </svg>
</button>

<div id="settings-panel">
  <div class="settings-label">Host ACRCloud</div>
  <input class="settings-input" id="acrHost" type="text" placeholder="identify-eu-west-1.acrcloud.com">
  <div class="settings-label">Access Key</div>
  <input class="settings-input" id="acrKey" type="text" placeholder="Access Key…">
  <div class="settings-label">Access Secret</div>
  <input class="settings-input" id="acrSecret" type="password" placeholder="Access Secret…">
  <div class="settings-hint">Compte gratuit sur <a href="https://www.acrcloud.com" target="_blank">acrcloud.com</a></div>
</div>

<div class="screen active" id="s-idle">
  <div class="logo">AURA</div>
  <div class="tagline">Reconnaissance musicale</div>
  <div class="listen-btn-wrap">
    <div class="listen-ripple"></div><div class="listen-ripple"></div><div class="listen-ripple"></div>
    <div class="listen-btn" id="listenBtn">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <span>Écouter</span>
    </div>
    </div>
  </div>
  <div class="idle-hint">Lance une musique, puis appuie sur écouter</div>
</div>

<div class="screen" id="s-listening">
  <div class="countdown-ring">
    <svg width="200" height="200">
      <circle class="countdown-track" cx="100" cy="100" r="90"/>
      <circle class="countdown-progress" id="countdownCircle" cx="100" cy="100" r="90"/>
    </svg>
    <div class="countdown-inner">
      <div class="countdown-num" id="countdownNum">8</div>
      <div class="countdown-label">secondes</div>
    </div>
  </div>
  <div class="listening-status"><span class="listening-dot"></span>Enregistrement…</div>
  <button class="cancel-btn" id="cancelBtn">Annuler</button>
</div>

<div class="screen" id="s-identifying">
  <div class="id-spinner"></div>
  <div class="id-label">Identification…</div>
  <div class="id-sub">Analyse en cours</div>
</div>

<div class="screen" id="s-result">
  <div class="cover-scene">
    <div class="cover-halo" id="coverHalo"></div>
    <div class="turntable-board" style="position:relative">
      <!-- SVG unique : tout dans le même repère = alignement parfait -->
      <svg class="turntable-svg" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="vg" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#2a2a2a"/>
            <stop offset="14%"  stop-color="#111"/>
            <stop offset="35%"  stop-color="#1c1c1c"/>
            <stop offset="36%"  stop-color="#080808"/>
            <stop offset="100%" stop-color="#040404"/>
          </radialGradient>
          <radialGradient id="shine" cx="38%" cy="28%" r="52%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <radialGradient id="pivotGrad" cx="38%" cy="32%" r="60%">
            <stop offset="0%" stop-color="#aaa"/>
            <stop offset="100%" stop-color="#1a1a1a"/>
          </radialGradient>
          <radialGradient id="rubyGrad" cx="35%" cy="25%" r="60%">
            <stop offset="0%" stop-color="#ff8080"/>
            <stop offset="100%" stop-color="#990000"/>
          </radialGradient>
          <!-- Clip pour l'image de pochette -->
          <clipPath id="coverClip">
            <circle cx="160" cy="160" r="44"/>
          </clipPath>
          <filter id="rubyGlow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- ── VINYLE (tourne) ── pivot 160,160 -->
        <g id="vinyl-group">
          <circle cx="160" cy="160" r="148" fill="url(#vg)"/>
          <circle cx="160" cy="160" r="141" fill="none" stroke="rgba(255,255,255,.05)"  stroke-width=".9"/>
          <circle cx="160" cy="160" r="134" fill="none" stroke="rgba(255,255,255,.03)"  stroke-width=".8"/>
          <circle cx="160" cy="160" r="127" fill="none" stroke="rgba(255,255,255,.05)"  stroke-width=".9"/>
          <circle cx="160" cy="160" r="120" fill="none" stroke="rgba(255,255,255,.03)"  stroke-width=".8"/>
          <circle cx="160" cy="160" r="113" fill="none" stroke="rgba(255,255,255,.05)"  stroke-width=".9"/>
          <circle cx="160" cy="160" r="106" fill="none" stroke="rgba(255,255,255,.03)"  stroke-width=".8"/>
          <circle cx="160" cy="160" r="99"  fill="none" stroke="rgba(255,255,255,.05)"  stroke-width=".9"/>
          <circle cx="160" cy="160" r="92"  fill="none" stroke="rgba(255,255,255,.03)"  stroke-width=".8"/>
          <circle cx="160" cy="160" r="85"  fill="none" stroke="rgba(255,255,255,.05)"  stroke-width=".9"/>
          <circle cx="160" cy="160" r="78"  fill="none" stroke="rgba(255,255,255,.03)"  stroke-width=".8"/>
          <!-- Zone label -->
          <circle cx="160" cy="160" r="60"  fill="#0d0d0d" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
          <!-- Reflet -->
          <circle cx="160" cy="160" r="148" fill="url(#shine)"/>
          <!-- Bord -->
          <circle cx="160" cy="160" r="148" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
          <!-- Picot central -->
          <circle cx="160" cy="160" r="5" fill="url(#pivotGrad)" stroke="rgba(255,255,255,.3)" stroke-width=".5"/>
        </g>

        <!-- ── POCHETTE (statique, par dessus) ── -->
        <image id="coverImgSvg" href="" x="116" y="116" width="88" height="88" clip-path="url(#coverClip)" preserveAspectRatio="xMidYMid slice" style="transition:opacity .45s ease"/>
        <!-- Bordure pochette -->
        <circle cx="160" cy="160" r="44" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>

        <!-- ── BRAS (pivote autour de 292,38) ── -->
        <g id="arm-group">
          <!-- Corps du bras en carbone -->
          <line x1="292" y1="38" x2="195" y2="228"
                stroke="url(#armGrad)" stroke-width="5" stroke-linecap="round"/>
          <!-- Headshell -->
          <rect x="188" y="224" width="14" height="20" rx="3"
                fill="#2a2a2a" stroke="rgba(255,255,255,.15)" stroke-width="1"
                transform="rotate(-15 195 234)"/>
          <!-- Rubis -->
          <ellipse id="rubyDot" cx="192" cy="248" rx="4" ry="5"
                   fill="url(#rubyGrad)" filter="url(#rubyGlow)"
                   stroke="rgba(255,100,100,.4)" stroke-width=".5"/>
        </g>

        <!-- Pivot du bras (cercle fixe par dessus) -->
        <circle cx="292" cy="38" r="14" fill="url(#pivotGrad)" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
        <circle cx="292" cy="38" r="5"  fill="#333"/>

        <defs>
          <linearGradient id="armGrad" x1="292" y1="38" x2="195" y2="228" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#888"/>
            <stop offset="40%" stop-color="#333"/>
            <stop offset="100%" stop-color="#1a1a1a"/>
          </linearGradient>
        </defs>
      </svg>

      <!-- div coverImg gardé pour compatibilité JS mais caché — on utilise coverImgSvg -->
      <div class="cover-img" id="coverImg" style="display:none"></div>
    </div>
  </div>
  <div class="result-card" id="resultCard">
    <div class="song-title" id="songTitle">—</div>
    <div class="song-artist" id="songArtist">—</div>
    <div class="song-album" id="songAlbum"></div>
    <div class="result-divider"></div>
    <div class="result-actions">
      <div class="scanning-badge">
        <div class="scanning-dot-wrap">
          <div class="scan-dot"></div><div class="scan-dot"></div><div class="scan-dot"></div>
        </div>
        <span id="scanStatus">En écoute…</span>
      </div>
      <button class="btn-stop" id="btnStop">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>Stop
      </button>
    </div>
  </div>
</div>

<div class="screen" id="s-error">
  <div class="err-icon">🎵</div>
  <div class="err-title">Non identifié</div>
  <div class="err-sub" id="errMsg">Aucune musique détectée.</div>
  <button class="btn-retry" id="btnRetry">Réessayer</button>
</div>

<script>
// ─────────────────────────────────────────────
//  Clés ACRCloud (pré-remplies, overridables ⚙️)
// ─────────────────────────────────────────────
const DEFAULT_HOST   = 'identify-eu-west-1.acrcloud.com';
const DEFAULT_KEY    = 'c6a3e8171462a7b9ef8d3d8d49ab9515';
const DEFAULT_SECRET = 'jVczX2ms0pvSsftRjIn8ZSFzYLUgiG84zNVTG8Gh';

const RECORD_SECS = 8;
const LOOP_GAP_MS = 5000;
const CIRC = 2 * Math.PI * 90;

let audioCtx, analyser, micStream;
let isActive = false, isFirstScan = true;
let countdownInterval, loopTimeout, animFrame;
let currentSongKey = '', toastTimer;

const canvas = document.getElementById('canvas');
const C = canvas.getContext('2d');
const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
resize();
window.addEventListener('resize', resize);

// ── Toast
function toast(msg, ms = 5000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

// ── Écrans
const S = ['idle','listening','identifying','result','error']
  .reduce((o, id) => { o[id] = document.getElementById('s-' + id); return o; }, {});
function show(name) {
  Object.values(S).forEach(s => s.classList.remove('active'));
  S[name]?.classList.add('active');
}

// ── Settings
const settingsToggle = document.getElementById('settings-toggle');
const settingsPanel  = document.getElementById('settings-panel');
settingsToggle.addEventListener('click', e => {
  e.stopPropagation();
  settingsPanel.classList.toggle('open');
});
document.addEventListener('click', e => {
  if (!settingsPanel.contains(e.target)) settingsPanel.classList.remove('open');
});

function getCreds() {
  return {
    host:   document.getElementById('acrHost').value.trim()   || DEFAULT_HOST,
    key:    document.getElementById('acrKey').value.trim()    || DEFAULT_KEY,
    secret: document.getElementById('acrSecret').value.trim() || DEFAULT_SECRET,
  };
}

// ── Boutons
document.getElementById('listenBtn').addEventListener('click', activate);
document.getElementById('btnRetry').addEventListener('click', activate);
document.getElementById('cancelBtn').addEventListener('click', () => { deactivate(); show('idle'); });
document.getElementById('btnStop').addEventListener('click', () => { deactivate(); show('idle'); });

// ── Activation micro
async function activate() {
  if (isActive) return;
  let stream = null;
  for (const c of [
    { audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } },
    { audio: true }
  ]) {
    try { stream = await navigator.mediaDevices.getUserMedia(c); break; } catch(e) {}
  }
  if (!stream) {
    showErr('Micro inaccessible.\nAutorise le microphone dans le navigateur.');
    return;
  }
  micStream = stream;
  audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.82;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  isActive = true; isFirstScan = true; currentSongKey = '';
  drawViz();
  runLoop();
}

function deactivate() {
  isActive = false;
  clearInterval(countdownInterval);
  clearTimeout(loopTimeout);
  cancelAnimationFrame(animFrame);
  C.clearRect(0, 0, canvas.width, canvas.height);
  micStream?.getTracks().forEach(t => t.stop());
  audioCtx?.close().catch(() => {});
  isFirstScan = true; currentSongKey = '';
  document.getElementById('vinyl-group')?.classList.remove('playing');
  document.getElementById('arm-group')?.classList.remove('on-record');
}

// ── Boucle de scan
async function runLoop() {
  if (!isActive) return;
  await doScan();
  if (!isActive) return;
  loopTimeout = setTimeout(runLoop, LOOP_GAP_MS);
}

function doScan() {
  return new Promise(async (resolve) => {
    if (!isActive) { resolve(); return; }

    if (isFirstScan) show('listening');
    else {
      document.getElementById('scanRing').classList.add('active');
      setScanStatus('Rescanning…');
    }

    let t = RECORD_SECS;
    updateCountUI(t, RECORD_SECS);
    countdownInterval = setInterval(() => { t--; updateCountUI(t, RECORD_SECS); }, 1000);

    const sr = audioCtx.sampleRate;
    const chunks = [];
    const src  = audioCtx.createMediaStreamSource(micStream);
    const proc = audioCtx.createScriptProcessor(4096, 1, 1);
    const gain = audioCtx.createGain(); gain.gain.value = 0;
    proc.onaudioprocess = e => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    src.connect(proc); proc.connect(gain); gain.connect(audioCtx.destination);

    await sleep(RECORD_SECS * 1000);
    clearInterval(countdownInterval);
    try { src.disconnect(); proc.disconnect(); gain.disconnect(); } catch(e) {}

    if (!isActive) { resolve(); return; }

    const total = chunks.reduce((s, c) => s + c.length, 0);
    toast(`🎙️ ${total} samples capturés\n→ Encodage WAV…`);

    if (total < sr * 2) {
      const m = 'Micro silencieux.\nVérifie les permissions.';
      if (isFirstScan) showErr(m); else { toast(m); endRescan(); }
      resolve(); return;
    }

    const wav = buildWav(chunks, total, sr);
    toast(`📤 WAV ${Math.round(wav.size / 1024)}KB → envoi ACRCloud…`);
    if (isFirstScan) show('identifying'); else setScanStatus('Identification…');
    await sendToACR(wav);
    resolve();
  });
}

function updateCountUI(remaining, total) {
  document.getElementById('countdownNum').textContent = remaining;
  document.getElementById('countdownCircle').style.strokeDashoffset =
    CIRC - ((total - remaining) / total) * CIRC;
}

// ── Encodage WAV 16kHz mono PCM
function buildWav(chunks, totalSamples, srcRate) {
  const TR = 16000, ratio = srcRate / TR;
  const outLen = Math.floor(totalSamples / ratio);
  const flat = new Float32Array(totalSamples);
  let off = 0;
  for (const c of chunks) { flat.set(c, off); off += c.length; }
  const pcm = new Int16Array(outLen);
  for (let i = 0; i < outLen; i++) {
    const v = flat[Math.min(Math.floor(i * ratio), totalSamples - 1)];
    pcm[i] = Math.max(-32768, Math.min(32767, v * 32767));
  }
  const dLen = pcm.byteLength;
  const buf  = new ArrayBuffer(44 + dLen);
  const dv   = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) dv.setUint8(o + i, s.charCodeAt(i)); };
  ws(0, 'RIFF'); dv.setUint32(4, 36 + dLen, true);
  ws(8, 'WAVE'); ws(12, 'fmt ');
  dv.setUint32(16, 16, true);
  dv.setUint16(20, 1, true);  // PCM
  dv.setUint16(22, 1, true);  // mono
  dv.setUint32(24, TR, true);
  dv.setUint32(28, TR * 2, true);
  dv.setUint16(32, 2, true);
  dv.setUint16(34, 16, true);
  ws(36, 'data'); dv.setUint32(40, dLen, true);
  new Uint8Array(buf).set(new Uint8Array(pcm.buffer), 44);
  return new Blob([buf], { type: 'audio/wav' });
}

// ── Signature HMAC-SHA1 (Web Crypto API) — requis par ACRCloud
async function hmacSHA256base64(secret, message) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', enc.encode(secret),
    { name: 'HMAC', hash: 'SHA-1' },
    false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
  return btoa(String.fromCharCode(...new Uint8Array(sig)));
}

// ── Envoi vers ACRCloud
async function sendToACR(wavBlob) {
  if (!wavBlob || wavBlob.size < 100) {
    toast('❌ WAV vide, annulé');
    if (isFirstScan) showErr('Fichier audio vide.\nVérifie le micro.'); else endRescan();
    return;
  }

  const { host, key, secret } = getCreds();
  const timestamp      = Math.floor(Date.now() / 1000).toString();
  const httpMethod     = 'POST';
  const httpUri        = '/v1/identify';
  const dataType       = 'audio';
  const signVersion    = '1';

  // Chaîne à signer exactement comme spécifié par ACRCloud
  const stringToSign = [httpMethod, httpUri, key, dataType, signVersion, timestamp].join('\n');
  const signature    = await hmacSHA256base64(secret, stringToSign);

  const fd = new FormData();
  fd.append('sample',            wavBlob, 'recording.wav');
  fd.append('access_key',        key);
  fd.append('data_type',         dataType);
  fd.append('signature_version', signVersion);
  fd.append('signature',         signature);
  fd.append('sample_bytes',      wavBlob.size.toString());
  fd.append('timestamp',         timestamp);

  toast(`📡 Envoi ACRCloud (${Math.round(wavBlob.size / 1024)}KB)…`);

  try {
    const res = await fetch(`https://${host}${httpUri}`, {
      method: 'POST',
      body: fd
      // ⚠️ Ne jamais définir Content-Type manuellement avec FormData
    });
    const text = await res.text();
    toast('📥 HTTP ' + res.status + ': ' + text.slice(0, 120));
    let data;
    try { data = JSON.parse(text); }
    catch(e) {
      toast('JSON error: ' + text.slice(0, 80));
      if (isFirstScan) showErr('Réponse invalide.'); else endRescan();
      return;
    }
    handleACRResp(data);
  } catch(e) {
    toast('ERR ' + e.message);
    if (isFirstScan) showErr('Erreur réseau:\n' + e.message); else endRescan();
  }
}

// ── Pochette via iTunes + fallback MusicBrainz/CAA
async function fetchCover(title, artist) {
  // Tentative 1 : iTunes Search API
  try {
    const q = encodeURIComponent(title + ' ' + artist);
    const res = await fetch('https://itunes.apple.com/search?term=' + q + '&media=music&limit=1&entity=song', {mode:'cors'});
    if (res.ok) {
      const json = await res.json();
      const url = json?.results?.[0]?.artworkUrl100;
      if (url) return url.replace('100x100bb', '600x600bb');
    }
  } catch(e) {}

  // Tentative 2 : MusicBrainz + Cover Art Archive (pas de CORS)
  try {
    const q = encodeURIComponent(title + ' ' + artist);
    const mb = await fetch('https://musicbrainz.org/ws/2/recording/?query=' + q + '&limit=1&fmt=json', {
      headers: {'User-Agent': 'AURA/1.0 (music recognition app)'}
    });
    if (mb.ok) {
      const mbd = await mb.json();
      const rid = mbd?.recordings?.[0]?.releases?.[0]?.id;
      if (rid) {
        const caa = await fetch('https://coverartarchive.org/release/' + rid + '/front-500');
        if (caa.ok) return caa.url;
      }
    }
  } catch(e) {}

  return null;
}

// ── Traitement réponse ACRCloud
async function handleACRResp(data) {
  const code = data?.status?.code;
  const msg  = data?.status?.msg || '';

  if (code === 0 && data.metadata?.music?.length > 0) {
    const track  = data.metadata.music[0];
    const title  = track.title || '—';
    const artist = track.artists?.[0]?.name || '—';
    const album  = track.album?.name || '';

    toast('✅ ' + title + ' — ' + artist);
    const key    = title + '|||' + artist;
    // isNew = true si chanson différente OU si c'est le premier scan du cycle (après un Stop/Retry)
    const isNew  = key !== currentSongKey || isFirstScan;
    currentSongKey = key;
    isFirstScan    = false;

    if (isNew) {
      const coverUrl = await fetchCover(title, artist);
      showResult({ title, artist, album, coverUrl }, true);
    } else {
      // Même chanson, même cycle → rien à changer, juste continuer l'écoute
      endRescan();
    }

  } else if (code === 1001) {
    if (isFirstScan)
      showErr('Musique non reconnue 😕\n\n• Monte le volume\n• Approche de l\'enceinte\n• Pas d\'écouteurs\n• Réessaie');
    else endRescan();

  } else {
    toast('❌ ACR code ' + code + ': ' + msg);
    if (isFirstScan) showErr('Erreur ACRCloud ' + code + '\n' + msg); else endRescan();
  }
}

// ── Affichage résultat
async function showResult(r, isNew) {
  const card     = document.getElementById('resultCard');
  const cover    = document.getElementById('coverImg');
  const onResult = S.result.classList.contains('active');

  if (isNew && onResult) {
    card.classList.add('fade');
    cover.classList.add('fade');
    await sleep(440);
  }

  document.getElementById('songTitle').textContent  = r.title  || '—';
  document.getElementById('songArtist').textContent = r.artist || '—';
  document.getElementById('songAlbum').textContent  = r.album  || '';

  if (isNew && r.coverUrl) {
    const svgImg = document.getElementById('coverImgSvg');
    if (svgImg) svgImg.setAttribute('href', r.coverUrl);
    cover.style.backgroundImage = `url('${r.coverUrl}')`;
    await extractColors(r.coverUrl);
  }
  document.getElementById('vinyl-group')?.classList.add('playing');
  setTimeout(() => document.getElementById('arm-group')?.classList.add('on-record'), 400);
  show('result');
  setScanStatus('En écoute…');

  if (isNew && onResult) {
    await sleep(20);
    card.classList.remove('fade');
    cover.classList.remove('fade');
  }
}

function endRescan()      { document.getElementById('scanRing').classList.remove('active'); setScanStatus('En écoute…'); }
function setScanStatus(t) { document.getElementById('scanStatus').textContent = t; }
function showErr(msg)     { deactivate(); document.getElementById('errMsg').textContent = msg; show('error'); }

// ── Extraction couleurs depuis la pochette
// On passe l'URL en base64 via fetch pour contourner CORS sur canvas
async function extractColors(url) {
  try {
    // Charger l'image via fetch pour avoir accès aux pixels sans blocage CORS
    const res = await fetch(url);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);

    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        try {
          const cv = document.createElement('canvas');
          cv.width = cv.height = 80;
          const cx2 = cv.getContext('2d');
          cx2.drawImage(img, 0, 0, 80, 80);
          const d   = cx2.getImageData(0, 0, 80, 80).data;
          const px  = (x, y) => { const i=(y*80+x)*4; return {r:d[i],g:d[i+1],b:d[i+2]}; };
          // Échantillonner plusieurs zones pour des couleurs riches
          const samples = [];
          for (let sy=0; sy<80; sy+=10) for (let sx=0; sx<80; sx+=10) samples.push(px(sx,sy));
          // Trouver les 3 couleurs les plus saturées
          const sat = ({r,g,b}) => { const mx=Math.max(r,g,b),mn=Math.min(r,g,b); return mx===0?0:(mx-mn)/mx; };
          samples.sort((a,b) => sat(b)-sat(a));
          const c1 = samples[0]||{r:10,g:10,b:18};
          const c2 = samples[Math.floor(samples.length/3)]||{r:20,g:15,b:30};
          const c3 = samples[Math.floor(samples.length*2/3)]||{r:8,g:18,b:28};
          const dk = ({r,g,b},f=0.35) => ({r:Math.round(r*f),g:Math.round(g*f),b:Math.round(b*f)});
          const a=dk(c1), b=dk(c2), cc=dk(c3);
          document.getElementById('bg').style.background =
            'radial-gradient(ellipse 80% 60% at 20% 30%,rgba('+a.r+','+a.g+','+a.b+',.95) 0%,transparent 60%),'
            +'radial-gradient(ellipse 70% 50% at 80% 70%,rgba('+b.r+','+b.g+','+b.b+',.85) 0%,transparent 60%),'
            +'radial-gradient(ellipse 60% 80% at 50% 10%,rgba('+cc.r+','+cc.g+','+cc.b+',.7) 0%,transparent 60%),#06060e';
          document.getElementById('coverHalo').style.background =
            'radial-gradient(circle,rgba('+a.r+','+a.g+','+a.b+',.95) 0%,transparent 70%)';
        } catch(e) {}
        URL.revokeObjectURL(blobUrl);
        resolve();
      };
      img.onerror = () => { URL.revokeObjectURL(blobUrl); resolve(); };
      img.src = blobUrl;
    });
  } catch(e) {
    // Fallback : essayer directement avec crossOrigin
    return new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          const cv = document.createElement('canvas'); cv.width = cv.height = 80;
          const cx2 = cv.getContext('2d'); cx2.drawImage(img,0,0,80,80);
          const d = cx2.getImageData(0,0,80,80).data;
          const px = (x,y) => { const i=(y*80+x)*4; return {r:d[i],g:d[i+1],b:d[i+2]}; };
          const dk = ({r,g,b},f=0.35) => ({r:Math.round(r*f),g:Math.round(g*f),b:Math.round(b*f)});
          const a=dk(px(40,40)), b=dk(px(8,8)), cc=dk(px(72,72));
          document.getElementById('bg').style.background =
            'radial-gradient(ellipse 80% 60% at 20% 30%,rgba('+a.r+','+a.g+','+a.b+',.95) 0%,transparent 65%),'
            +'radial-gradient(ellipse 70% 50% at 80% 70%,rgba('+b.r+','+b.g+','+b.b+',.85) 0%,transparent 65%),'
            +'radial-gradient(ellipse 60% 80% at 50% 10%,rgba('+cc.r+','+cc.g+','+cc.b+',.7) 0%,transparent 65%),#06060e';
          document.getElementById('coverHalo').style.background =
            'radial-gradient(circle,rgba('+a.r+','+a.g+','+a.b+',.95) 0%,transparent 70%)';
        } catch(e2) {}
        resolve();
      };
      img.onerror = resolve;
      img.src = url;
    });
  }
}

// ── Visualiseur canvas
const pts = Array.from({ length: 80 }, () => ({
  angle: Math.random() * Math.PI * 2,
  r:     120 + Math.random() * 220,
  speed: (Math.random() - .5) * .006,
  size:  .8 + Math.random() * 2,
  fi:    Math.floor(Math.random() * 100)
}));

function drawViz() {
  if (!isActive || !analyser) return;
  animFrame = requestAnimationFrame(drawViz);
  const W = canvas.width, H = canvas.height;
  C.clearRect(0, 0, W, H);
  const buf  = analyser.frequencyBinCount;
  const freq = new Uint8Array(buf);
  const time = new Uint8Array(buf);
  analyser.getByteFrequencyData(freq);
  analyser.getByteTimeDomainData(time);
  const vol = Math.min(freq.slice(0,128).reduce((a,b) => a+b, 0) / 128 / 200, 1);
  const cx = W/2, cy = H/2, B = 100;
  const g = C.createRadialGradient(cx, cy, B, cx, cy, B+180);
  g.addColorStop(0, `rgba(255,255,255,${.02+vol*.06})`);
  g.addColorStop(1, 'rgba(255,255,255,0)');
  C.beginPath(); C.arc(cx, cy, B+180, 0, Math.PI*2); C.fillStyle = g; C.fill();
  for (let i = 0; i < 120; i++) {
    const a  = (i/120)*Math.PI*2 - Math.PI/2;
    const v  = freq[Math.floor(i*buf/120/3)] / 255;
    const bh = 6 + v * 80;
    C.beginPath();
    C.moveTo(cx + Math.cos(a)*B,      cy + Math.sin(a)*B);
    C.lineTo(cx + Math.cos(a)*(B+bh), cy + Math.sin(a)*(B+bh));
    C.strokeStyle = `hsla(${180+v*80},30%,88%,${.25+v*.75})`;
    C.lineWidth = 2; C.lineCap = 'round'; C.stroke();
  }
  C.beginPath();
  for (let i = 0; i < buf; i++) {
    const a = (i/buf)*Math.PI*2 - Math.PI/2;
    const v = (time[i]-128)/128;
    const r = B - 10 + v*20*vol;
    i === 0
      ? C.moveTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r)
      : C.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
  }
  C.closePath();
  C.strokeStyle = `rgba(255,255,255,${.1+vol*.2})`; C.lineWidth = 1.5; C.stroke();
  pts.forEach(p => {
    p.angle += p.speed + vol*.003;
    const fv = freq[p.fi]/255;
    const r  = B + 20 + fv*80*vol + p.r*.25;
    C.beginPath();
    C.arc(cx + Math.cos(p.angle)*r, cy + Math.sin(p.angle)*r, p.size + fv*1.5, 0, Math.PI*2);
    C.fillStyle = `rgba(255,255,255,${.07+fv*.5})`; C.fill();
  });
}

const sleep = ms => new Promise(r => setTimeout(r, ms));
